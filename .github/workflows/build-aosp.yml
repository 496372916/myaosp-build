name: Build AOSP 8.1

on:
  workflow_dispatch:

env:
  AOSP_BRANCH: android-8.1.0_r52
  REPO_URL: https://mirrors.tuna.tsinghua.edu.cn/git/git-repo
  AOSP_MIRROR: https://aosp.tuna.tsinghua.edu.cn

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison gperf build-essential \
          zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
          lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip python
        sudo apt-get install -y openjdk-8-jdk

    - name: Install repo tool
      run: |
        mkdir -p ~/.local/bin
        curl -sSL ${{ env.REPO_URL }} > ~/.local/bin/repo
        chmod a+x ~/.local/bin/repo
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Configure git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

    - name: Initialize AOSP repo
      run: |
        mkdir -p ~/aosp
        cd ~/aosp
        repo init -u ${{ env.AOSP_MIRROR }}/platform/manifest -b ${{ env.AOSP_BRANCH }} --depth=1

    - name: Sync AOSP source
      run: |
        cd ~/aosp
        repo sync -j2 -c --no-tags --no-clone-bundle

    - name: Set up build environment
      run: |
        cd ~/aosp
        source build/envsetup.sh
        lunch aosp_x86_64-phone-userdebug

    - name: Build AOSP
      run: |
        cd ~/aosp
        source build/envsetup.sh
        lunch aosp_x86_64-phone-userdebug
        make -j2

    - name: Prepare artifacts
      run: |
        cd ~/aosp
        mkdir -p artifacts
        find out/target/product -name "*.img" -exec cp {} artifacts/ \; 2>/dev/null || true
        cd artifacts && tar -czf ../aosp-build-output.tar.gz . 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aosp-build-${{ github.run_id }}
        path: ~/aosp/aosp-build-output.tar.gz
        retention-days: 7
